name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring, zip
          coverage: none
      - name: Validate tag version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Test
        run: php tools/test.php
      - name: Build release artifacts
        run: php tools/build.php --version=${{ steps.version.outputs.version }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/oc_mcp-opencart3-v${{ steps.version.outputs.version }}.ocmod.zip
            dist/mcp.ocmod.zip
