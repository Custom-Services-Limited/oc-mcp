name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring, zip
          coverage: none

      - name: Compute next version
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          LATEST="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$LATEST" ]]; then
            LATEST="none"
          fi
          VERSION="$(php tools/next-version.php --latest="$LATEST")"
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate composer metadata
        run: composer validate --strict --no-check-publish

      - name: Run tests
        run: php tools/test.php

      - name: Run OpenCart 3 E2E
        run: tools/e2e/opencart3.sh

      - name: Run OpenCart 4 E2E
        run: tools/e2e/opencart4.sh

      - name: Build release artifacts
        run: php tools/build.php --version=${{ steps.version.outputs.version }}

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/oc_mcp-opencart3-v${{ steps.version.outputs.version }}.ocmod.zip
            dist/mcp.ocmod.zip

      - name: Assert clean release workspace
        shell: bash
        run: |
          rm -rf dist artifacts
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            git status --short --untracked-files=all
            exit 1
          fi
